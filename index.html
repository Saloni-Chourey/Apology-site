<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry💔</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: #333;
        overflow: hidden;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 420px;
        animation: fadeIn 1.5s ease;
        z-index: 2;
    }

    h1 { color: #ff4b5c; }

    p { font-size: 16px; line-height: 1.6; }

    button {
        margin-top: 15px;
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        background: #ff4b5c;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #e8434f; }

    .hidden-message {
        margin-top: 20px;
        display: none;
        color: #555;
        font-weight: bold;
    }

    .heart {
        position: absolute;
        font-size: 24px;
        animation: floatUp 3s linear forwards;
        opacity: 0.8;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="card">
    <h1>I'm Sorry 😔</h1>
    <p>
        Krati… sun na 😭
        <br><br>
        Galti meri thi… sorry 😔
        <br><br>
        Ab itna bhi gussa mat reh yaar… 🥺
    </p>

    <button onclick="showMessage()">Theek hai maaf kiya 😌</button>
    <button id="noBtn" onmouseover="moveButton()">Nahi karungi 😤</button>

    <div class="hidden-message" id="msg">
        Yay Krati ❤️
        <br>Ab normal ho ja please 🥺
    </div>
</div>

<script>
// 🔥 FIX: unlock audio after first user interaction
let audioUnlocked = false;
document.addEventListener("click", () => {
    audioUnlocked = true;
}, { once: true });
// Voice function
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'hi-IN';
    speech.rate = 1;
    speech.pitch = 1.2;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

function showMessage() {
    document.getElementById('msg').style.display = 'block';
    createHearts();

    // meme sound (clap)
    let audio = new Audio("jethalal-thank-you-audio-meme-download.mp3");
    audio.play();
}

function createHearts() {
    for (let i = 0; i < 25; i++) {
        let heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '😄';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '0px';
        heart.style.fontSize = (20 + Math.random() * 25) + 'px';
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 3000);
    }
}

function moveButton() {
    let btn = document.getElementById('noBtn');

    // play sound BEFORE escaping 😈
    if(audioUnlocked){
        let audio = new Audio("fahhh_KcgAXfs.mp3");
        audio.currentTime = 0;
        audio.play();
    }

    btn.style.position = 'absolute';
    btn.style.top = Math.random() * 80 + 'vh';
    btn.style.left = Math.random() * 80 + 'vw';
}

// Optional: intro voice on load
window.onload = () => {
    setTimeout(() => {
        speak("🥺");

        // sad violin meme 😂
        let audio = new Audio("jethalal-thank-you-audio-meme-download.mp3");
    audio.play();
    }, 800);
};
</script>

</body>
</html>
